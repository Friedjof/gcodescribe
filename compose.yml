# Cap container log files so they can't fill the host disk over time.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  gcodescribe:
    build: .
    ports:
      - "${PLOTTER_HOST_PORT:-8000}:8000"
    environment:
      # Point these at your OctoPrint instance.
      OCTOPRINT_URL: "${OCTOPRINT_URL:-}"
      OCTOPRINT_API_KEY: "${OCTOPRINT_API_KEY:-}"
      OCTOPRINT_VERIFY_SSL: "${OCTOPRINT_VERIFY_SSL:-true}"
      # Direct USB-serial backend (bypasses OctoPrint). Enable it with
      # PRINTER_SERIAL_ENABLED=true; both backends can be configured at once and
      # switched at runtime in the UI. PRINTER_DEFAULT_BACKEND picks the initial
      # one (octoprint|serial) until a choice is persisted. Uncomment the
      # `devices`/`group_add` blocks below to pass the port in.
      PRINTER_SERIAL_ENABLED: "${PRINTER_SERIAL_ENABLED:-false}"
      PRINTER_DEFAULT_BACKEND: "${PRINTER_DEFAULT_BACKEND:-}"
      PRINTER_SERIAL_PORT: "${PRINTER_SERIAL_PORT:-/dev/ttyUSB0}"
      PRINTER_SERIAL_BAUD: "${PRINTER_SERIAL_BAUD:-115200}"
      # Deprecated alias for PRINTER_SERIAL_ENABLED=true + default serial.
      PRINTER_USE_SERIAL: "${PRINTER_USE_SERIAL:-false}"
      REDIS_URL: "redis://redis:6379/0"
      PLOTTER_AUTH_SESSION_TTL: "${PLOTTER_AUTH_SESSION_TTL:-1209600}"
      PLOTTER_AUTH_COOKIE_SECURE: "${PLOTTER_AUTH_COOKIE_SECURE:-false}"
    # Serial mode only: pass the printer's USB device into the container and grant
    # access to the host's serial group. Use `stat -c '%g' /dev/ttyUSB0` to find
    # the GID if `dialout` doesn't match. A persistent /dev/serial/by-id/... path
    # survives reboots better than ttyUSB0.
    # devices:
    #   - "${PRINTER_SERIAL_PORT:-/dev/ttyUSB0}:${PRINTER_SERIAL_PORT:-/dev/ttyUSB0}"
    # group_add:
    #   - dialout
    volumes:
      - gcodescribe-data:/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 1g
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  gcodescribe-data:
  redis-data:
