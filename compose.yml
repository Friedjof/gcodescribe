# Cap container log files so they can't fill the host disk over time.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  gcodescribe:
    # NOTE: Run this as a single instance only. The live-view WebSocket stream
    # keeps its sessions in process memory, so the publisher and the viewer must
    # reach the same process. Do NOT set deploy.replicas > 1, do NOT run multiple
    # gcodescribe containers behind a load balancer, and keep uvicorn at a single
    # worker (see plotter/web/server.py). If you ever need to scale out, move the
    # stream onto Redis pub/sub (Redis is already a service here).
    build:
      context: .
      network: host
    ports:
      - "${PLOTTER_HOST_PORT:-8000}:8000"
    environment:
      # Point these at your OctoPrint instance.
      OCTOPRINT_URL: "${OCTOPRINT_URL:-}"
      OCTOPRINT_API_KEY: "${OCTOPRINT_API_KEY:-}"
      OCTOPRINT_VERIFY_SSL: "${OCTOPRINT_VERIFY_SSL:-true}"
      # Direct USB-serial backend (bypasses OctoPrint). Enable it with
      # PRINTER_SERIAL_ENABLED=true; both backends can be configured at once and
      # switched at runtime in the UI. PRINTER_DEFAULT_BACKEND picks the initial
      # one (octoprint|serial) until a choice is persisted. If serial is the
      # active backend it opens the USB port at app start and keeps it for the
      # container lifetime. The configured USB device is passed through below.
      PRINTER_SERIAL_ENABLED: "${PRINTER_SERIAL_ENABLED:-false}"
      PRINTER_DEFAULT_BACKEND: "${PRINTER_DEFAULT_BACKEND:-}"
      PRINTER_SERIAL_PORT: "${PRINTER_SERIAL_PORT:-/dev/ttyUSB0}"
      PRINTER_SERIAL_BAUD: "${PRINTER_SERIAL_BAUD:-115200}"
      # Deprecated alias for PRINTER_SERIAL_ENABLED=true + default serial.
      PRINTER_USE_SERIAL: "${PRINTER_USE_SERIAL:-false}"
      REDIS_URL: "redis://redis:6379/0"
      PLOTTER_AUTH_SESSION_TTL: "${PLOTTER_AUTH_SESSION_TTL:-1209600}"
      PLOTTER_AUTH_COOKIE_SECURE: "${PLOTTER_AUTH_COOKIE_SECURE:-false}"
    # Serial mode: pass the configured USB device into the container and grant
    # access to the host's serial group. A persistent /dev/serial/by-id/... path
    # survives reboots better than ttyUSB0. If group name `dialout` is not valid
    # for your host/container combination, set PRINTER_SERIAL_GROUP to the numeric
    # GID from: stat -c '%g' /dev/ttyUSB0
    devices:
      - "${PRINTER_SERIAL_PORT:-/dev/ttyUSB0}:${PRINTER_SERIAL_PORT:-/dev/ttyUSB0}"
    group_add:
      - "${PRINTER_SERIAL_GROUP:-dialout}"
    volumes:
      - gcodescribe-data:/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 1g
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  gcodescribe-data:
  redis-data:
