name: CI

# Branch pushes and PRs only. A tag push (vX.Y.Z) does not match `branches`,
# so the release workflow runs instead of this one — never both for one tag.
on:
  push:
    branches: ['**']
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Stage 1: Checks ───────────────────────────────────────────────────────
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint
        run: uv run ruff check .

      - name: Run tests
        run: uv run pytest -q

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      # `npm run build` is `tsc -b && vite build` — this also typechecks.
      - name: Typecheck & build
        working-directory: frontend
        run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: web-out
          path: plotter/web/static/
          retention-days: 7

  # ── Stage 2: Package ──────────────────────────────────────────────────────
  package:
    name: Package
    needs: [backend, frontend]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v4
        with:
          name: web-out
          path: plotter/web/static/

      - name: System dependencies
        run: |
          sudo add-apt-repository -y ppa:deadsnakes/ppa
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            python3.12 python3.12-venv python3.12-dev \
            ruby ruby-dev rubygems build-essential rpm \
            libfuse2
          sudo gem install fpm --no-document

      - name: Read version
        id: ver
        run: |
          echo "ver=$(python3.12 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")" \
            >> "$GITHUB_OUTPUT"

      - name: Prepare staging directory
        run: |
          # plotter/web/static/ is already populated by the download-artifact step
          STAGING="$PWD/staging"
          VENV="$STAGING/usr/lib/gcodescribe"

          python3.12 -m venv "$VENV"
          "$VENV/bin/pip" install --quiet .

          # Launcher wrappers that delegate to the bundled venv entry points
          mkdir -p "$STAGING/usr/bin"
          for cmd in gcodescribe gcodescribe-web gcodescribe-desktop; do
            printf '#!/bin/sh\nexec /usr/lib/gcodescribe/bin/%s "$@"\n' "$cmd" \
              > "$STAGING/usr/bin/$cmd"
            chmod +x "$STAGING/usr/bin/$cmd"
          done

          # Desktop integration
          install -Dm644 packaging/flatpak/info.noweck.gcodescribe.desktop \
            "$STAGING/usr/share/applications/info.noweck.gcodescribe.desktop"
          install -Dm644 packaging/flatpak/info.noweck.gcodescribe.svg \
            "$STAGING/usr/share/icons/hicolor/scalable/apps/info.noweck.gcodescribe.svg"
          install -Dm644 packaging/flatpak/info.noweck.gcodescribe.metainfo.xml \
            "$STAGING/usr/share/metainfo/info.noweck.gcodescribe.metainfo.xml"

      - name: Build .deb
        run: |
          fpm -s dir -t deb \
            -n gcodescribe \
            --version "${{ steps.ver.outputs.ver }}" \
            --description "GCodeScribe — convert documents into pen-plotter G-code" \
            --url "https://github.com/${{ github.repository }}" \
            --maintainer "Friedjof Noweck <claude@noweck.info>" \
            --license MIT \
            --depends libgtk-4-1 \
            --depends libwebkit2gtk-4.1-0 \
            --depends python3.12 \
            -C staging usr/

      - name: Build .rpm
        run: |
          fpm -s dir -t rpm \
            -n gcodescribe \
            --version "${{ steps.ver.outputs.ver }}" \
            --description "GCodeScribe — convert documents into pen-plotter G-code" \
            --url "https://github.com/${{ github.repository }}" \
            --maintainer "Friedjof Noweck <claude@noweck.info>" \
            --license MIT \
            --depends gtk4 \
            --depends webkitgtk6.0 \
            --depends python3.12 \
            -C staging usr/

      - name: Build AppImage
        run: |
          wget -q \
            https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

          cp -a staging/. AppDir/
          cp packaging/flatpak/info.noweck.gcodescribe.desktop AppDir/gcodescribe.desktop
          cp packaging/flatpak/info.noweck.gcodescribe.svg AppDir/gcodescribe.svg

          # AppRun uses $APPDIR set by the AppImage runtime
          printf '#!/bin/sh\nexec "$APPDIR/usr/lib/gcodescribe/bin/gcodescribe-desktop" "$@"\n' \
            > AppDir/AppRun
          chmod +x AppDir/AppRun

          ARCH=x86_64 VERSION="${{ steps.ver.outputs.ver }}" \
            ./appimagetool-x86_64.AppImage --appimage-extract-and-run AppDir \
            "GCodeScribe-${{ steps.ver.outputs.ver }}-x86_64.AppImage"

      - uses: actions/upload-artifact@v4
        with:
          name: pkg-deb
          path: "*.deb"
          retention-days: 7

      - uses: actions/upload-artifact@v4
        with:
          name: pkg-rpm
          path: "*.rpm"
          retention-days: 7

      - uses: actions/upload-artifact@v4
        with:
          name: pkg-appimage
          path: "GCodeScribe-*.AppImage"
          retention-days: 7

  flatpak:
    name: Build Flatpak
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-49
      options: --privileged
    steps:
      - uses: actions/checkout@v5

      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: GCodeScribe.flatpak
          manifest-path: packaging/flatpak/info.noweck.gcodescribe.yml
          cache-key: flatpak-builder-${{ github.sha }}
          upload-artifact: true
