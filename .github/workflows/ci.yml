name: CI

# Branch pushes and PRs only. A tag push (vX.Y.Z) does not match `branches`,
# so the release workflow runs instead of this one — never both for one tag.
on:
  push:
    branches: ['**']
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ── Stage 1: Checks ───────────────────────────────────────────────────────
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint
        run: uv run ruff check .

      - name: Run tests
        run: uv run pytest -q

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      # `npm run build` is `tsc -b && vite build` — this also typechecks.
      - name: Typecheck & build
        working-directory: frontend
        run: npm run build

      - uses: actions/upload-artifact@v7
        with:
          name: web-out
          path: plotter/web/static/
          retention-days: 7

  # ── Stage 2: Package ──────────────────────────────────────────────────────
  package:
    name: Package
    needs: [backend, frontend]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v8
        with:
          name: web-out
          path: plotter/web/static/

      - name: System dependencies
        run: |
          sudo add-apt-repository -y ppa:deadsnakes/ppa
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            python3.12 python3.12-venv python3.12-dev \
            ruby ruby-dev rubygems build-essential rpm \
            libfuse2
          sudo gem install fpm --no-document

      - name: Read version
        id: ver
        run: |
          echo "ver=$(python3.12 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")" \
            >> "$GITHUB_OUTPUT"

      - name: Build deb / rpm / AppImage
        run: |
          bash scripts/build-pkg.sh deb   "${{ steps.ver.outputs.ver }}"
          bash scripts/build-pkg.sh rpm   "${{ steps.ver.outputs.ver }}"
          bash scripts/build-pkg.sh appimage "${{ steps.ver.outputs.ver }}"

      - uses: actions/upload-artifact@v7
        with:
          name: pkg-deb
          path: "*.deb"
          retention-days: 7

      - uses: actions/upload-artifact@v7
        with:
          name: pkg-rpm
          path: "*.rpm"
          retention-days: 7

      - uses: actions/upload-artifact@v7
        with:
          name: pkg-appimage
          path: "GCodeScribe-*.AppImage"
          retention-days: 7

  flatpak:
    name: Build Flatpak
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-49
      options: --privileged
    steps:
      - uses: actions/checkout@v5

      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: GCodeScribe.flatpak
          manifest-path: packaging/flatpak/info.noweck.gcodescribe.yml
          cache-key: flatpak-builder-${{ github.sha }}
          upload-artifact: true
