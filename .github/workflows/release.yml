name: Release

# Only on semver tags. Branch pushes go to the CI workflow instead, so a tag
# push never triggers CI as well.
on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write   # create the GitHub release
  packages: write   # push the image to GHCR

# The docker/* actions still ship on Node 20 (no newer major yet); force them
# onto Node 24 so the deprecation warning doesn't surface. The GitHub/astral
# actions above are already on their Node 24 majors.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Same checks as CI — a release must not ship if tests or the build fail.
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint
        run: uv run ruff check .

      - name: Run tests
        run: uv run pytest -q

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Typecheck & build frontend
        working-directory: frontend
        run: npm run build

  release:
    name: Publish release
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # full history + all tags for the changelog

      - name: Generate release notes
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          chmod +x .github/scripts/release-notes.sh
          .github/scripts/release-notes.sh "${GITHUB_REF_NAME}" > notes.md
          cat notes.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes-file notes.md \
            --verify-tag

  # Build the Flatpak bundle and attach it to the GitHub release.
  flatpak:
    name: Build & upload Flatpak
    needs: release
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-49
      options: --privileged
    steps:
      - uses: actions/checkout@v5

      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: GCodeScribe-${{ github.ref_name }}.flatpak
          manifest-path: packaging/flatpak/info.noweck.gcodescribe.yml
          cache-key: flatpak-builder-${{ github.ref_name }}
          upload-artifact: true

      - name: Upload Flatpak bundle to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            "GCodeScribe-${GITHUB_REF_NAME}.flatpak" \
            --repo "${GITHUB_REPOSITORY}" --clobber

  # Build deb, rpm and AppImage and attach them to the GitHub release.
  package:
    name: Build & upload packages
    needs: release
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        # vite outputs to ../plotter/web/static (see vite.config.ts outDir)

      - name: System dependencies
        run: |
          sudo add-apt-repository -y ppa:deadsnakes/ppa
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            python3.12 python3.12-venv python3.12-dev \
            ruby ruby-dev rubygems build-essential rpm \
            libfuse2 file
          sudo gem install fpm --no-document

      - name: Read version
        id: ver
        run: |
          echo "ver=$(python3.12 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")" \
            >> "$GITHUB_OUTPUT"

      - name: Build deb / rpm / AppImage
        run: |
          bash scripts/build-pkg.sh deb      "${{ steps.ver.outputs.ver }}"
          bash scripts/build-pkg.sh rpm      "${{ steps.ver.outputs.ver }}"
          bash scripts/build-pkg.sh appimage "${{ steps.ver.outputs.ver }}"

      - name: Upload packages to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            *.deb *.rpm "GCodeScribe-${{ steps.ver.outputs.ver }}-x86_64.AppImage" \
            --repo "${GITHUB_REPOSITORY}" --clobber

  # Optional: build & publish the Docker image to GHCR. Delete this job if you
  # don't want to publish a container image on release.
  image:
    name: Build & push image
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
